<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP DPC - Planilha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="frame">
    <header>
      <p class="eyebrow">APP DPC</p>
      <h1>Aba DPC - Visao organizada</h1>
      <p class="muted">Abas: DPC (B1:B7), Agenda (G7:K43) e Gabarito (A:ZZ).</p>
      <div class="actions">
        <button id="reload">Atualizar</button>
        <span id="status" class="status">Carregando...</span>
      </div>
    </header>

    <main>
      <div class="card">
        <div class="card-header">
          <div>
            <p class="label">Planilha</p>
            <p id="view-title" class="value">DPC / B1:B7</p>
          </div>
          <div class="tab-switch" role="tablist" aria-label="Abas de visualizacao">
            <button id="tab-dpc" class="tab-btn is-active" data-tab="dpc" type="button" role="tab" aria-selected="true">DPC</button>
            <button id="tab-agenda" class="tab-btn" data-tab="agenda" type="button" role="tab" aria-selected="false">Agenda</button>
            <button id="tab-lista" class="tab-btn" data-tab="lista" type="button" role="tab" aria-selected="false">Gabarito</button>
          </div>
        </div>

        <div class="card-content">
          <section id="view-dpc" class="tab-view is-active">
            <div id="sheet-board" class="sheet-board" aria-live="polite">
              <p class="empty">Carregando...</p>
            </div>
          </section>

          <section id="view-agenda" class="tab-view">
            <div class="agenda-wrap">
              <table id="agenda-table" class="agenda-table" aria-live="polite">
                <colgroup></colgroup>
                <tbody></tbody>
              </table>
            </div>
          </section>

          <section id="view-lista" class="tab-view">
            <form id="lista-form" class="lista-controls">
              <label>
                <span>Lista</span>
                <select id="lista-select"></select>
              </label>
              <button id="lista-load" type="submit">Carregar lista</button>
            </form>

            <div id="lista-meta" class="lista-meta">Carregando...</div>

            <ul id="lista-items" class="lista-items" aria-live="polite">
              <li class="empty">Carregando...</li>
            </ul>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const reloadBtn = document.getElementById('reload');
    const viewTitleEl = document.getElementById('view-title');
    const board = document.getElementById('sheet-board');
    const agendaTable = document.getElementById('agenda-table');
    const tabButtons = Array.from(document.querySelectorAll('.tab-btn'));
    const dpcView = document.getElementById('view-dpc');
    const agendaView = document.getElementById('view-agenda');
    const listaView = document.getElementById('view-lista');
    const listaForm = document.getElementById('lista-form');
    const listaSelect = document.getElementById('lista-select');
    const listaMeta = document.getElementById('lista-meta');
    const listaItems = document.getElementById('lista-items');

    const TAB_CONFIG = {
      dpc: { title: 'DPC / B1:B7', endpoint: '/api/data' },
      agenda: { title: 'DPC / G7:K43', endpoint: '/api/agenda' },
      lista: { title: 'Gabarito / A:ZZ', endpoint: '/api/lista' }
    };

    const cache = { dpc: null, agenda: null, lista: null };
    let activeTab = 'dpc';

    function setActiveTab(tab) {
      activeTab = tab;
      viewTitleEl.textContent = TAB_CONFIG[tab].title;

      dpcView.classList.toggle('is-active', tab === 'dpc');
      agendaView.classList.toggle('is-active', tab === 'agenda');
      listaView.classList.toggle('is-active', tab === 'lista');

      tabButtons.forEach((button) => {
        const isActive = button.dataset.tab === tab;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-selected', String(isActive));
      });
    }

    function buildListaParams() {
      const params = new URLSearchParams();
      if (listaSelect.value) params.set('lista', listaSelect.value);
      return params.toString();
    }

    async function loadData(force = false) {
      statusEl.textContent = 'Carregando...';
      reloadBtn.disabled = true;

      try {
        if (!force && cache[activeTab]) {
          renderByTab(activeTab, cache[activeTab]);
          statusEl.textContent = 'Dados atualizados agora';
          return;
        }

        let endpoint = TAB_CONFIG[activeTab].endpoint;
        if (activeTab === 'lista') {
          const query = buildListaParams();
          if (query) endpoint += `?${query}`;
        }

        const res = await fetch(endpoint, { cache: 'no-store' });
        if (!res.ok) {
          const payload = await res.json().catch(() => ({}));
          throw new Error(payload?.detail || payload?.error || 'Erro ao buscar dados');
        }

        const payload = await res.json();
        cache[activeTab] = payload;
        renderByTab(activeTab, payload);
        statusEl.textContent = 'Dados atualizados agora';
      } catch (err) {
        console.error(err);
        renderErrorByTab(activeTab, err.message);
        statusEl.textContent = 'Falha ao carregar';
      } finally {
        reloadBtn.disabled = false;
      }
    }

    function renderByTab(tab, payload) {
      if (tab === 'agenda') {
        renderAgenda(payload.data || []);
      } else if (tab === 'lista') {
        renderLista(payload);
      } else {
        renderDpc(payload.data || []);
      }
    }

    function renderErrorByTab(tab, message) {
      if (tab === 'agenda') {
        const tbody = agendaTable.querySelector('tbody');
        tbody.innerHTML = `<tr><td class="empty">${message}</td></tr>`;
      } else if (tab === 'lista') {
        listaMeta.textContent = message;
        listaItems.innerHTML = `<li class="empty">${message}</li>`;
      } else {
        board.innerHTML = `<p class="empty">${message}</p>`;
      }
    }

    function normalizeRows(rows) {
      return (rows || [])
        .map((row) => ({
          left: String(row?.[0] || '').trim(),
          right: row.slice(1).join(',').trim()
        }))
        .filter((row) => row.left || row.right);
    }

    function buildLines(text) {
      return String(text || '')
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);
    }

    function renderDpc(rows) {
      board.innerHTML = '';
      const normalizedRows = normalizeRows(rows);

      if (!normalizedRows.length) {
        board.innerHTML = '<p class="empty">Nenhum dado retornado</p>';
        return;
      }

      const isSingleColumn = (rows || []).every((row) => (row || []).length <= 1);
      if (isSingleColumn) {
        const topRow = normalizedRows[0];
        const topSection = document.createElement('section');
        topSection.className = 'sheet-top';
        topSection.innerHTML = `
          <p class="sheet-top-label">Data</p>
          <div class="sheet-top-value">${topRow.left || '-'}</div>
        `;
        board.appendChild(topSection);

        const list = document.createElement('div');
        list.className = 'sheet-list';

        normalizedRows.slice(1).forEach((row) => {
          const section = document.createElement('section');
          section.className = 'sheet-row sheet-row-single';

          const content = document.createElement('div');
          content.className = 'sheet-row-content';

          const paragraph = document.createElement('p');
          paragraph.className = 'sheet-line';
          paragraph.textContent = row.left || '-';
          content.appendChild(paragraph);

          section.appendChild(content);
          list.appendChild(section);
        });

        board.appendChild(list);
        return;
      }

      const topRow = normalizedRows[0];
      const topSection = document.createElement('section');
      topSection.className = 'sheet-top';
      topSection.innerHTML = `
        <p class="sheet-top-label">Topo da aba</p>
        <div class="sheet-top-value">${topRow.right || '-'}</div>
      `;
      board.appendChild(topSection);

      const list = document.createElement('div');
      list.className = 'sheet-list';

      normalizedRows.slice(1).forEach((row) => {
        const section = document.createElement('section');
        section.className = 'sheet-row';

        const title = document.createElement('div');
        title.className = 'sheet-row-title';
        title.textContent = row.left || 'Sem titulo';

        const content = document.createElement('div');
        content.className = 'sheet-row-content';
        const lines = buildLines(row.right);

        if (!lines.length) {
          const emptyLine = document.createElement('p');
          emptyLine.className = 'sheet-line is-empty';
          emptyLine.textContent = 'Sem conteudo';
          content.appendChild(emptyLine);
        } else {
          lines.forEach((line) => {
            const paragraph = document.createElement('p');
            paragraph.className = 'sheet-line';
            paragraph.textContent = line;
            content.appendChild(paragraph);
          });
        }

        section.appendChild(title);
        section.appendChild(content);
        list.appendChild(section);
      });

      board.appendChild(list);
    }

    function normalizeAgendaRows(rows) {
      const width = Math.max(1, ...(rows || []).map((row) => row.length));
      return (rows || []).map((row) =>
        Array.from({ length: width }, (_unused, index) => String(row[index] || '').trim())
      );
    }

    function renderAgenda(rows) {
      const colgroup = agendaTable.querySelector('colgroup');
      const tbody = agendaTable.querySelector('tbody');
      colgroup.innerHTML = `
        <col class="agenda-col">
        <col class="agenda-col">
        <col class="agenda-col agenda-col-quarta">
        <col class="agenda-col">
        <col class="agenda-col">
      `;
      tbody.innerHTML = '';

      const matrix = normalizeAgendaRows(rows);
      if (!matrix.length) {
        tbody.innerHTML = '<tr><td class="empty">Nenhum dado retornado</td></tr>';
        return;
      }

      matrix.forEach((row, rowIndex) => {
        const tr = document.createElement('tr');

        row.forEach((cell, colIndex) => {
          const td = document.createElement('td');
          td.textContent = cell;

          if (rowIndex === 0 && cell) {
            td.classList.add('agenda-month');
          } else if (/^\d{1,2}$/.test(cell)) {
            td.classList.add('agenda-day');
          } else if (cell) {
            td.classList.add('agenda-text');
          }

          if (colIndex === 2) {
            td.classList.add('agenda-col-quarta-cell');
          }

          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });
    }

    function renderLista(payload) {
      const options = payload?.options || {};
      const selected = payload?.selected || {};
      const listas = options.listas || [];

      listaSelect.innerHTML = '';
      listas.forEach((listaName) => {
        const option = document.createElement('option');
        option.value = listaName;
        option.textContent = listaName;
        listaSelect.appendChild(option);
      });

      const selectedLista = selected.lista || listas[0] || '';
      if (selectedLista) listaSelect.value = selectedLista;

      const items = payload?.items || [];
      const withLink = items.filter((item) => item.hasLink && item.link).length;
      const warning = payload?.warning ? ` | ${payload.warning}` : '';

      listaMeta.textContent =
        `${selectedLista || '-'} | ${items.length} numero(s) | ${withLink} link(s)${warning}`;

      if (!items.length) {
        listaItems.innerHTML = '<li class="empty">Nenhum numero encontrado.</li>';
        return;
      }

      listaItems.innerHTML = '';
      items.forEach((item, idx) => {
        const li = document.createElement('li');
        li.className = 'lista-item';

        const left = document.createElement('div');
        left.className = 'lista-item-main';
        left.innerHTML = `
          <span class="lista-badge">${idx + 1}</span>
          <div>
            <strong>Numero ${item.numero}</strong>
            <small>${item.cell || ''}</small>
          </div>
        `;

        let right;
        if (item.hasLink && item.link) {
          right = document.createElement('a');
          right.className = 'link-btn';
          right.href = item.link;
          right.target = '_blank';
          right.rel = 'noopener noreferrer';
          right.textContent = 'Abrir link';
        } else {
          right = document.createElement('button');
          right.className = 'link-btn is-disabled';
          right.type = 'button';
          right.disabled = true;
          right.textContent = 'Sem link';
        }

        li.appendChild(left);
        li.appendChild(right);
        listaItems.appendChild(li);
      });
    }

    tabButtons.forEach((button) => {
      button.addEventListener('click', () => {
        const nextTab = button.dataset.tab;
        if (!TAB_CONFIG[nextTab] || nextTab === activeTab) return;
        setActiveTab(nextTab);
        loadData();
      });
    });

    reloadBtn.addEventListener('click', () => loadData(true));

    listaForm.addEventListener('submit', (event) => {
      event.preventDefault();
      cache.lista = null;
      setActiveTab('lista');
      loadData(true);
    });

    setActiveTab('dpc');
    loadData();
  </script>
</body>
</html>
