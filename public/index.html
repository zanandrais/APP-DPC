<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APP DPC - Planilha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="frame">
    <header>
      <p class="eyebrow">APP DPC</p>
      <h1>Aba DPC - Visao organizada</h1>
      <p class="muted">Leitura da planilha publicada com uma linha organizada por turma.</p>
      <div class="actions">
        <button id="reload">Atualizar</button>
        <span id="status" class="status">Carregando...</span>
      </div>
    </header>

    <main>
      <div class="card">
        <div class="card-header">
          <div>
            <p class="label">Planilha</p>
            <p class="value">DPC / A1:B5</p>
          </div>
        </div>
        <div id="sheet-board" class="sheet-board" aria-live="polite">
          <p class="empty">Carregando...</p>
        </div>
      </div>
    </main>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const board = document.getElementById('sheet-board');
    const reloadBtn = document.getElementById('reload');

    async function loadData() {
      statusEl.textContent = 'Carregando...';
      reloadBtn.disabled = true;

      try {
        const res = await fetch('/api/data');
        if (!res.ok) throw new Error('Erro ao buscar dados');

        const { data } = await res.json();
        renderBoard(data || []);
        statusEl.textContent = 'Dados atualizados agora';
      } catch (err) {
        console.error(err);
        renderBoard([]);
        statusEl.textContent = 'Falha ao carregar';
      } finally {
        reloadBtn.disabled = false;
      }
    }

    function normalizeRows(rows) {
      return (rows || [])
        .map((row) => ({
          left: String(row?.[0] || '').trim(),
          right: row.slice(1).join(',').trim()
        }))
        .filter((row) => row.left || row.right);
    }

    function buildLines(text) {
      return String(text || '')
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);
    }

    function renderBoard(rows) {
      board.innerHTML = '';
      const normalizedRows = normalizeRows(rows);

      if (!normalizedRows.length) {
        board.innerHTML = '<p class="empty">Nenhum dado retornado</p>';
        return;
      }

      const topRow = normalizedRows[0];
      const topSection = document.createElement('section');
      topSection.className = 'sheet-top';
      topSection.innerHTML = `
        <p class="sheet-top-label">Topo da aba</p>
        <div class="sheet-top-value">${topRow.right || '-'}</div>
      `;
      board.appendChild(topSection);

      const list = document.createElement('div');
      list.className = 'sheet-list';

      normalizedRows.slice(1).forEach((row) => {
        const section = document.createElement('section');
        section.className = 'sheet-row';

        const title = document.createElement('div');
        title.className = 'sheet-row-title';
        title.textContent = row.left || 'Sem titulo';

        const content = document.createElement('div');
        content.className = 'sheet-row-content';

        const lines = buildLines(row.right);

        if (!lines.length) {
          const emptyLine = document.createElement('p');
          emptyLine.className = 'sheet-line is-empty';
          emptyLine.textContent = 'Sem conteudo';
          content.appendChild(emptyLine);
        } else {
          lines.forEach((line) => {
            const paragraph = document.createElement('p');
            paragraph.className = 'sheet-line';
            paragraph.textContent = line;
            content.appendChild(paragraph);
          });
        }

        section.appendChild(title);
        section.appendChild(content);
        list.appendChild(section);
      });

      board.appendChild(list);
    }

    reloadBtn.addEventListener('click', loadData);
    loadData();
  </script>
</body>
</html>
